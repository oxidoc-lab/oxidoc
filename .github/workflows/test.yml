# Reusable test workflow: lint, check, test, package, and build verification.
#
# Called by:
#   - ci.yml      (PR checks)
#   - release.yml (pre-publish gate)

name: Test

on:
  workflow_call:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-assets:
    name: Prepare Assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: wasm-assets

      - name: Build Wasm assets
        run: |
          cargo build -p oxidoc-registry -p oxidoc-openapi -p oxidoc-search --target wasm32-unknown-unknown --release
          mkdir -p oxidoc-cli/assets/wasm
          for stem in oxidoc_registry oxidoc_openapi oxidoc_search; do
            wasm-bindgen target/wasm32-unknown-unknown/release/${stem}.wasm --out-dir oxidoc-cli/assets/wasm --target web --no-typescript
          done

      - name: Create stub embedding model
        run: |
          mkdir -p oxidoc-cli/assets/models
          dd if=/dev/zero of=oxidoc-cli/assets/models/bge-micro-v2.gguf bs=1 count=1

      - name: Upload bundled assets
        uses: actions/upload-artifact@v5
        with:
          name: bundled-assets
          path: |
            oxidoc-cli/assets/wasm/
            oxidoc-cli/assets/models/bge-micro-v2.gguf
          retention-days: 1

  lint:
    name: Lint & Check
    needs: prepare-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download bundled assets
        uses: actions/download-artifact@v5
        with:
          name: bundled-assets
          path: oxidoc-cli/assets

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: lint

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Build documentation
        run: cargo doc --workspace --no-deps

      - name: Run doc tests
        run: cargo test --workspace --doc

  test:
    name: Test (${{ matrix.os }})
    needs: prepare-assets
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Download bundled assets
        uses: actions/download-artifact@v5
        with:
          name: bundled-assets
          path: oxidoc-cli/assets

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: test

      - name: Run tests
        run: cargo test -p oxidoc-core -p oxidoc-cli -p oxidoc-island


  build-binaries:
    name: Build (${{ matrix.target }})
    needs: prepare-assets
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runs-on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - runs-on: macos-latest
            target: x86_64-apple-darwin
          - runs-on: macos-latest
            target: aarch64-apple-darwin
          - runs-on: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v5

      - name: Download bundled assets
        uses: actions/download-artifact@v5
        with:
          name: bundled-assets
          path: oxidoc-cli/assets

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: build-${{ matrix.target }}

      - name: Build oxidoc binary
        run: cargo build -p oxidoc-cli --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}
