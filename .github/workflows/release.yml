name: Release
run-name: Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-version:
    name: Validate Version Tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Validate tag against Cargo.toml
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          TAG_VERSION="${TAG#v}"

          CARGO_VERSION=$(cargo metadata --no-deps --format-version=1 \
            | jq -r '.packages[] | select(.name == "oxidoc-cli") | .version')
          CARGO_BASE=$(echo "$CARGO_VERSION" | grep -oP '^\d+\.\d+\.\d+')

          echo "Tag version: $TAG_VERSION"
          echo "Cargo.toml version: $CARGO_VERSION"
          echo "Cargo.toml base: $CARGO_BASE"

          if [[ ! "$TAG_VERSION" =~ ^([0-9]+\.[0-9]+\.[0-9]+)(-[a-zA-Z]+\.[0-9]+)?$ ]]; then
            echo "::error::Invalid tag format '$TAG'. Expected: vX.Y.Z or vX.Y.Z-label.N"
            exit 1
          fi

          TAG_BASE="${BASH_REMATCH[1]}"

          if [[ "$TAG_BASE" != "$CARGO_BASE" ]]; then
            echo "::error::Base version mismatch! Tag '$TAG_BASE' != Cargo.toml '$CARGO_BASE'"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT

  ci:
    name: CI Gate
    needs: validate-version
    uses: ./.github/workflows/ci.yml

  prepare-assets:
    name: Prepare Bundled Assets
    needs: validate-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: wasm-assets

      - name: Build Wasm assets
        run: |
          cargo build -p oxidoc-registry -p oxidoc-openapi -p oxidoc-search --target wasm32-unknown-unknown --release
          mkdir -p oxidoc-cli/assets/wasm
          for stem in oxidoc_registry oxidoc_openapi oxidoc_search; do
            wasm-bindgen target/wasm32-unknown-unknown/release/${stem}.wasm --out-dir oxidoc-cli/assets/wasm --target web --no-typescript
          done

      - name: Download embedding model
        run: |
          mkdir -p oxidoc-cli/assets/models
          curl -L -o oxidoc-cli/assets/models/bge-micro-v2.gguf \
            https://huggingface.co/fs90/bge-micro-v2-i1-GGUF/resolve/main/bge-micro-v2.i1-Q4_K_M.gguf

      - name: Upload bundled assets
        uses: actions/upload-artifact@v5
        with:
          name: release-assets
          path: |
            oxidoc-cli/assets/wasm/
            oxidoc-cli/assets/models/bge-micro-v2.gguf
          retention-days: 1

  publish-crates:
    name: Publish to crates.io
    needs: [validate-version, ci, prepare-assets]
    runs-on: ubuntu-latest
    environment: crates.io
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5

      - name: Download bundled assets
        uses: actions/download-artifact@v5
        with:
          name: release-assets
          path: oxidoc-cli/assets

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set version from tag
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          CURRENT=$(cargo metadata --no-deps --format-version=1 | jq -r '.packages[] | select(.name == "oxidoc-cli") | .version')
          if [[ "$VERSION" != "$CURRENT" ]]; then
            # Update workspace.package version
            sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" Cargo.toml

            # For prerelease versions, update internal dependency requirements
            # (semver "0.1" won't match "0.1.0-beta.1")
            if [[ "$VERSION" == *-* ]]; then
              sed -i -E 's/(oxidoc-(core|island|components|registry|openapi|search|text) = \{ version = )"[^"]*"/\1"='$VERSION'"/' Cargo.toml
              echo "Updated internal dep versions to =$VERSION"
            fi

            echo "Updated workspace version: $CURRENT -> $VERSION"
          else
            echo "Version already matches, no change needed"
          fi

      # Publish in dependency order:
      #   Tier 1: oxidoc-island, oxidoc-text (no internal deps)
      #   Tier 2: oxidoc-core (depends on tier 1)
      #   Tier 3: oxidoc-cli (depends on tier 2)
      - name: Publish to crates.io
        run: |
          TIER1="oxidoc-island oxidoc-text"
          TIER2="oxidoc-core"
          TIER3="oxidoc-cli"

          is_published() {
            curl -sf -H "User-Agent: oxidoc-ci (github.com/oxidoc/oxidoc)" "https://crates.io/api/v1/crates/$1/$2" > /dev/null 2>&1
          }

          wait_for() {
            local crate="$1" version="$2"
            echo -n "  Waiting for $crate@$version..."
            for i in $(seq 1 30); do
              if is_published "$crate" "$version"; then
                echo " ready"
                return 0
              fi
              sleep 5
            done
            echo " timed out!"
            return 1
          }

          publish_tier() {
            local tier_name="$1"; shift
            local crates=("$@")
            local need_wait=()

            echo "::group::Tier: $tier_name"
            for crate in "${crates[@]}"; do
              VERSION=$(cargo metadata --no-deps --format-version=1 \
                | jq -r --arg name "$crate" '.packages[] | select(.name == $name) | .version')
              if is_published "$crate" "$VERSION"; then
                echo "  $crate@$VERSION already published — skipping"
              else
                echo "  Publishing $crate@$VERSION..."
                cargo publish -p "$crate" --allow-dirty --no-verify
                need_wait+=("$crate:$VERSION")
              fi
            done

            for entry in "${need_wait[@]}"; do
              wait_for "${entry%%:*}" "${entry##*:}"
            done
            echo "::endgroup::"
          }

          publish_tier "1 (no deps)"    $TIER1
          publish_tier "2 (core)"       $TIER2
          publish_tier "3 (cli)"        $TIER3
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build-binaries:
    name: Build (${{ matrix.target }})
    needs: [validate-version, prepare-assets]
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: oxidoc
          - runs-on: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: oxidoc
            cross: true
          - runs-on: macos-latest
            target: x86_64-apple-darwin
            artifact: oxidoc
          - runs-on: macos-latest
            target: aarch64-apple-darwin
            artifact: oxidoc
          - runs-on: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: oxidoc.exe
    steps:
      - uses: actions/checkout@v5

      - name: Download bundled assets
        uses: actions/download-artifact@v5
        with:
          name: release-assets
          path: oxidoc-cli/assets

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.target }}

      - name: Build oxidoc binary
        run: cargo build -p oxidoc-cli --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.cross && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Prepare binary artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          chmod +x ${{ matrix.artifact }}
          tar czf oxidoc-${{ needs.validate-version.outputs.version }}-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}
          ls -lh oxidoc-*.tar.gz

      - name: Prepare binary artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          $version = "${{ needs.validate-version.outputs.version }}"
          $artifact = "${{ matrix.artifact }}"
          $target = "${{ matrix.target }}"
          $zipname = "oxidoc-${version}-${target}.zip"
          Compress-Archive -Path $artifact -DestinationPath $zipname
          ls -l $zipname

      - name: Upload artifacts
        uses: actions/upload-artifact@v5
        with:
          name: binaries-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/oxidoc-*.tar.gz
            target/${{ matrix.target }}/release/oxidoc-*.zip
          retention-days: 1

  github-release:
    name: Create GitHub Release
    needs: [validate-version, build-binaries, publish-crates]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts

      - name: Create release notes
        run: |
          VERSION="${{ needs.validate-version.outputs.version }}"
          echo "# Oxidoc $VERSION" > release-notes.md
          echo "" >> release-notes.md
          echo "### Release Notes" >> release-notes.md
          echo "" >> release-notes.md
          echo "Refer to [CHANGELOG.md](./CHANGELOG.md) for details." >> release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.validate-version.outputs.version }}
          name: Oxidoc ${{ needs.validate-version.outputs.version }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(needs.validate-version.outputs.version, '-') }}
          files: artifacts/**/*
