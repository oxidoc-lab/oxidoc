openapi: "3.0.0"
info:
  title: "{project_name} API"
  version: "1.0.0"
  description: >
    Sample API specification using JSONPlaceholder as a live backend.
    Replace with your own OpenAPI spec.

servers:
  - url: https://jsonplaceholder.typicode.com
    description: JSONPlaceholder (free fake API for testing)

paths:
  /posts:
    get:
      summary: List posts
      operationId: listPosts
      description: Returns all posts. Supports filtering by user.
      tags:
        - Posts
      parameters:
        - name: userId
          in: query
          required: false
          description: Filter posts by user ID
          schema:
            type: integer
      responses:
        "200":
          description: A list of posts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Post"
    post:
      summary: Create a post
      operationId: createPost
      description: Creates a new post (faked — returns the created object with an ID).
      tags:
        - Posts
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - body
                - userId
              properties:
                title:
                  type: string
                  example: My New Post
                body:
                  type: string
                  example: This is the post body.
                userId:
                  type: integer
                  example: 1
      responses:
        "201":
          description: Post created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"

  /posts/{postId}:
    get:
      summary: Get post by ID
      operationId: getPost
      description: Returns a single post by its ID.
      tags:
        - Posts
      parameters:
        - name: postId
          in: path
          required: true
          description: Post ID
          schema:
            type: integer
      responses:
        "200":
          description: Post details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Post"
        "404":
          description: Post not found

  /posts/{postId}/comments:
    get:
      summary: Get comments for a post
      operationId: getPostComments
      description: Returns all comments on a specific post.
      tags:
        - Comments
      parameters:
        - name: postId
          in: path
          required: true
          description: Post ID
          schema:
            type: integer
      responses:
        "200":
          description: A list of comments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Comment"

  /users:
    get:
      summary: List users
      operationId: listUsers
      description: Returns all users.
      tags:
        - Users
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /users/{userId}:
    get:
      summary: Get user by ID
      operationId: getUser
      description: Returns a single user by their ID.
      tags:
        - Users
      parameters:
        - name: userId
          in: path
          required: true
          description: User ID
          schema:
            type: integer
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: User not found

  /todos:
    get:
      summary: List todos
      operationId: listTodos
      description: Returns all todos. Supports filtering by user and completion status.
      tags:
        - Todos
      parameters:
        - name: userId
          in: query
          required: false
          description: Filter by user ID
          schema:
            type: integer
        - name: completed
          in: query
          required: false
          description: Filter by completion status
          schema:
            type: boolean
      responses:
        "200":
          description: A list of todos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Todo"

components:
  schemas:
    Post:
      type: object
      properties:
        userId:
          type: integer
        id:
          type: integer
        title:
          type: string
        body:
          type: string

    Comment:
      type: object
      properties:
        postId:
          type: integer
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        body:
          type: string

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        website:
          type: string

    Todo:
      type: object
      properties:
        userId:
          type: integer
        id:
          type: integer
        title:
          type: string
        completed:
          type: boolean
