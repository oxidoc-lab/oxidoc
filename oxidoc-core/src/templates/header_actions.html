<div class="oxidoc-header-actions">
  <button
    class="oxidoc-theme-toggle"
    aria-label="Toggle dark mode"
    title="Toggle theme"
  >
    <iconify-icon icon="material-symbols:light-mode-rounded" width="20" height="20" aria-hidden="true"></iconify-icon>
  </button>
  <button
    data-oxidoc-search
    class="oxidoc-search-trigger"
    aria-label="Search documentation"
    title="Search (Ctrl+K)"
  >
    <iconify-icon icon="material-symbols:search-rounded" width="16" height="16" aria-hidden="true"></iconify-icon>
    <span>Search</span>
    <kbd class="oxidoc-search-kbd">Ctrl K</kbd>
  </button>
</div>
